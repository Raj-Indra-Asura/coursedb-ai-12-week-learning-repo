version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: coursedb_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-coursedb_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coursedb_password}
      POSTGRES_DB: ${POSTGRES_DB:-coursedb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coursedb_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
